      "definition_latex": "g\\circ f:\\X\\to\\{0,1\\}\\text{ for some }g:\\Y\\to\\{0,1\\}",
      "definition_text": "Predicate definable through the fixed interface f.",
      "notes": "Used in the bounded-interface theorem."
    },
    {
