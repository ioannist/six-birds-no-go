      "symbol_latex": "\\mathrm{Def}(f)",
      "name": "family of definable predicates",
      "kind": "family",
      "definition_latex": "\\mathrm{Def}(f):=\\{g\\circ f : g:\\Y\\to\\{0,1\\}\\}",
      "definition_text": "All predicates definable through f.",
      "notes": "Used in the bounded-interface counting theorem."
    },
    {
      "notation_id": "N.image.imf",
      "symbol_latex": "|\\mathrm{im}(f)|",
      "name": "image size of f",
      "kind": "cardinality",
      "definition_latex": "|\\mathrm{im}(f)|=|\\{f(x):x\\in\\X\\}|",
      "definition_text": "Cardinality of the image of the deterministic lens f.",
      "notes": "Used in the definability counting formula."
    },
    {
      "notation_id": "N.map.ell",
      "symbol_latex": "\\ell",
      "name": "deterministic observation lens",
      "kind": "map",
      "definition_latex": "\\ell:\\X\\to\\Y",
      "definition_text": "Deterministic observation or coarse-graining lens.",
      "notes": "Used in arrow and protocol statements."
    },
    {
      "notation_id": "N.pathlaw.micro",
      "symbol_latex": "\\mathbf{P}^{(T)}_{\\mu,P}",
      "name": "micro path law",
      "kind": "path_distribution",
      "definition_latex": "\\mathbf{P}^{(T)}_{\\mu,P}(x_{0:T})=\\mu(x_0)\\prod_{t=0}^{T-1} P(x_t,x_{t+1})",
      "definition_text": "Exact finite path law determined by the initial law and micro kernel.",
      "notes": "Used in arrow and protocol statements."
    },
    {
      "notation_id": "N.operator.TP",
      "symbol_latex": "T_P",
      "name": "Markov operator on laws",
      "kind": "operator",
      "definition_latex": "T_P(\\nu)=\\nu P",
      "definition_text": "Action of the kernel P on distributions.",
