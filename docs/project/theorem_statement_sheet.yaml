    {
      "theorem_id": "NG_PROTOCOL_TRAP",
      "title": "Stationary reversible lift implies zero observed arrow",
      "formal_statement_latex": "Let $\\tilde\\X$ be finite, let $\\tilde P: \\tilde\\X\\times\\tilde\\X\\to[0,1]$ be row-stochastic, and let $\\tilde\\pi$ be a stationary distribution satisfying detailed balance $\\tilde\\pi(x)\\tilde P(x,x')=\\tilde\\pi(x')\\tilde P(x',x)$ for all $x,x'\\in\\tilde\\X$. Then for every horizon $T\\ge 1$, \\[ (\\mathrm{rev}_T)_{\\#}\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P}=\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P} \\qquad\\Rightarrow\\qquad \\KL\\!\\Big(\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P}\\ \\Big\\|\\ (\\mathrm{rev}_T)_{\\#}\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P}\\Big)=0.\\] Moreover, for every deterministic observation $\\ell:\\tilde\\X\\to\\Y$, \\[ \\KL\\!\\Big((\\ell^{(T)})_{\\#}\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P}\\ \\Big\\|\\ (\\mathrm{rev}_T)_{\\#}(\\ell^{(T)})_{\\#}\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P}\\Big)=0.\\]",
      "hypotheses": [
        {
          "hid": "H1",
          "latex": "\\tilde\\pi \\tilde P = \\tilde\\pi",
          "prose": "The lifted chain is stationary under the chosen initial law."
        },
        {
          "hid": "H2",
          "latex": "\\tilde\\pi(x)\\tilde P(x,x')=\\tilde\\pi(x')\\tilde P(x',x)\\text{ for all }x,x'",
          "prose": "The lifted chain is reversible in the detailed-balance sense."
        }
      ],
      "conclusions": [
        {
          "cid": "C1",
          "latex": "(\\mathrm{rev}_T)_{\\#}\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P}=\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P}",
          "prose": "The lifted path law is invariant under path reversal."
        },
        {
          "cid": "C2",
          "latex": "\\KL(\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P}\\|(\\mathrm{rev}_T)_{\\#}\\mathbf{P}^{(T)}_{\\tilde\\pi,\\tilde P})=0",
          "prose": "The lifted micro arrow vanishes, and every honest observed arrow also vanishes."
        }
      ],
      "dependencies": [
        {
          "kind": "theorem",
          "ref": "NG_ARROW_DPI",
          "note": "Transfers zero path-reversal KL through deterministic observation."
        },
        {
          "kind": "lemma",
          "ref": "reversible_stationary_path_symmetry",
          "note": "Stationary detailed balance implies exact path-law reversal symmetry."
        }
      ],
      "proof_ingredients": [
        "Use detailed balance to compare each path with its reversal under the stationary lifted law.",
        "Conclude exact equality of the path law with its reversed pushforward.",
        "Apply deterministic data processing to obtain the zero observed-arrow formula for every deterministic observation."
      ],
