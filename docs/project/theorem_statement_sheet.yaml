    {
      "theorem_id": "NG_MACRO_CLOSURE_DEFICIT",
      "title": "Variational identity for closure deficit",
      "formal_statement_latex": "Let $(\\X,P)$ be a finite Markov chain, let $\\mu\\in\\D(\\X)$, let $\\Pi:\\X\\to\\Y$ be deterministic, and fix $\\tau\\ge 1$. For each $x\\in\\X$, define the packaged future law \\[ p_x^{(\\tau)}(y') := \\Pr_{\\mu,P}[\\Pi(X_{t+\\tau})=y' \\mid X_t=x].\\] For a candidate macro kernel $K:\\Y\\times\\Y\\to[0,1]$, define \\[ \\mathcal{L}_\\tau(K) := \\sum_{x\\in \\X} \\mu(x)\\,\\KL\\!\\big(p_x^{(\\tau)} \\mid K_{\\Pi(x)}\\big).\\] Define the closure deficit by \\[ \\mathrm{CD}_\\tau(\\Pi) := I\\!\\big(X_t;\\Pi(X_{t+\\tau})\\,\\big|\\,\\Pi(X_t)\\big).\\] Then the kernel \\[ K^\\star_y(y') := \\Pr_{\\mu,P}[\\Pi(X_{t+\\tau})=y' \\mid \\Pi(X_t)=y] \\] satisfies \\[ \\mathrm{CD}_\\tau(\\Pi)=\\min_K \\mathcal{L}_\\tau(K)=\\mathcal{L}_\\tau(K^\\star).\\] Moreover, if there exist $x,x'\\in\\X$ with $\\Pi(x)=\\Pi(x')$, $\\mu(x)>0$, $\\mu(x')>0$, and $p_x^{(\\tau)}\\neq p_{x'}^{(\\tau)}$, then $\\mathrm{CD}_\\tau(\\Pi)>0$.",
      "hypotheses": [
        {
          "hid": "H1",
          "latex": "\\mu\\in\\D(\\X),\\ P:\\X\\times\\X\\to[0,1],\\ \\Pi:\\X\\to\\Y,\\ \\tau\\ge 1",
          "prose": "Finite initial law, finite Markov kernel, deterministic packaging map, and fixed lag."
        },
        {
          "hid": "H2",
          "latex": "K:\\Y\\times\\Y\\to[0,1]\\text{ row-stochastic}",
          "prose": "The variational problem ranges over finite macro kernels."
        }
      ],
      "conclusions": [
        {
          "cid": "C1",
          "latex": "\\mathrm{CD}_\\tau(\\Pi)=\\min_K \\mathcal{L}_\\tau(K)=\\mathcal{L}_\\tau(K^\\star)",
          "prose": "Closure deficit equals the attained minimum of the exact variational objective."
        },
        {
          "cid": "C2",
          "latex": "\\exists x,x'\\text{ with }\\Pi(x)=\\Pi(x'),\\ \\mu(x)>0,\\ \\mu(x')>0,\\text{ and }p_x^{(\\tau)}\\neq p_{x'}^{(\\tau)} \\Rightarrow \\mathrm{CD}_\\tau(\\Pi)>0",
          "prose": "Distinct packaged future laws inside a single positive-mass package class force positive closure deficit."
        }
      ],
      "dependencies": [
        {
          "kind": "lemma",
          "ref": "conditional_macro_law_minimizer",
          "note": "The conditional macro future law minimizes the weighted KL objective."
        },
        {
          "kind": "lemma",
          "ref": "conditional_information_variational_identity",
          "note": "Finite conditional mutual information equals the attained KL minimum."
        }
      ],
      "proof_ingredients": [
        "Write the weighted KL mismatch as a conditional expectation over package classes.",
        "Minimize rowwise using the conditional packaged future law.",
        "Identify the minimum with conditional mutual information and derive the positive-deficit corollary from disagreement on positive stationary mass."
      ],
