      "title": "Exactness kills cycle sums",
      "formal_statement_latex": "Assume $a(u,v)=\\phi(v)-\\phi(u)$ on oriented edges of a finite graph. Then for every closed walk $v_0,\\dots,v_k=v_0$, \\[ \\sum_{i=0}^{k-1} a(v_i,v_{i+1}) = 0.\\]",
      "hypotheses": [
        {
          "hid": "H1",
          "latex": "a(u,v)=\\phi(v)-\\phi(u)",
          "prose": "The edge label is an exact potential difference."
        },
        {
          "hid": "H2",
          "latex": "v_0,\\dots,v_k=v_0",
          "prose": "The vertices define a closed walk in the exact support graph."
        }
      ],
      "conclusions": [
        {
          "cid": "C1",
          "latex": "\\sum_{i=0}^{k-1} a(v_i,v_{i+1}) = 0",
          "prose": "Every closed-walk affinity vanishes under exactness."
