    {
      "theorem_id": "NG_ARROW_DPI",
      "title": "Arrow cannot increase under honest deterministic observation",
      "formal_statement_latex": "Let $\\mu\\in\\D(\\X)$, let $P:\\X\\times\\X\\to[0,1]$ be row-stochastic, and let $T\\ge 1$. Define the micro path law on $\\X^{T+1}$ by \\[\\mathbf{P}^{(T)}_{\\mu,P}(x_{0:T})=\\mu(x_0)\\prod_{t=0}^{T-1}P(x_t,x_{t+1}).\\] Let $\\mathrm{rev}_T(x_{0:T})=(x_T,\\dots,x_0)$ and let $\\ell:\\X\\to\\Y$ be deterministic with pointwise extension $\\ell^{(T)}(x_{0:T})=(\\ell(x_0),\\dots,\\ell(x_T))$. Then \\[\\KL\\!\\Big((\\ell^{(T)})_{\\#}\\mathbf{P}^{(T)}_{\\mu,P}\\ \\Big\\|\\ (\\mathrm{rev}_T)_{\\#}(\\ell^{(T)})_{\\#}\\mathbf{P}^{(T)}_{\\mu,P}\\Big)\\ \\le\\ \\KL\\!\\Big(\\mathbf{P}^{(T)}_{\\mu,P}\\ \\Big\\|\\ (\\mathrm{rev}_T)_{\\#}\\mathbf{P}^{(T)}_{\\mu,P}\\Big).\\]",
      "hypotheses": [
        {
          "hid": "H1",
          "latex": "\\mu\\in\\D(\\X),\\ P:\\X\\times\\X\\to[0,1]\\text{ row-stochastic},\\ T\\ge 1",
          "prose": "Finite initial law, finite Markov kernel, and finite path horizon."
        },
        {
          "hid": "H2",
          "latex": "\\ell:\\X\\to\\Y\\text{ deterministic}",
          "prose": "Observation is an honest deterministic lens."
        }
      ],
      "conclusions": [
        {
          "cid": "C1",
          "latex": "\\KL((\\ell^{(T)})_{\\#}\\mathbf{P}^{(T)}_{\\mu,P}\\| (\\mathrm{rev}_T)_{\\#}(\\ell^{(T)})_{\\#}\\mathbf{P}^{(T)}_{\\mu,P}) \\le \\KL(\\mathbf{P}^{(T)}_{\\mu,P}\\| (\\mathrm{rev}_T)_{\\#}\\mathbf{P}^{(T)}_{\\mu,P})",
          "prose": "Observed path-reversal KL cannot exceed the micro path-reversal KL."
        }
      ],
      "dependencies": [
        {
          "kind": "lemma",
          "ref": "deterministic_pushforward_dpi",
          "note": "Finite KL data processing for deterministic pushforwards."
        }
      ],
      "proof_ingredients": [
        "Represent the observed path law as the deterministic pushforward of the micro path law.",
        "Apply finite KL data processing under the map \\ell^{(T)}.",
        "Read the zero-arrow corollary from the inequality when the micro divergence vanishes."
      ],
      "required_notation": [
        "N.state_space.X",
        "N.state_space.Y",
        "N.simplex.DeltaX",
        "N.distribution.mu",
