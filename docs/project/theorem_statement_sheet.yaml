    {
      "theorem_id": "NG_FORCE_FOREST",
      "title": "Forest exactness theorem",
      "formal_statement_latex": "Let $G=(V,E)$ be a finite undirected forest. Let $a$ be an antisymmetric function on oriented edges, so that $a(u,v)=-a(v,u)$ and $a(u,v)=0$ whenever $\\{u,v\\}\\notin E$. Then there exists a potential $\\phi:V\\to\\mathbb{R}$ such that for every oriented edge $(u,v)$, \\[ a(u,v)=\\phi(v)-\\phi(u).\\]",
      "hypotheses": [
        {
          "hid": "H1",
          "latex": "G=(V,E)\\text{ is a finite forest}",
          "prose": "The exact support graph has no undirected cycles."
        },
        {
          "hid": "H2",
          "latex": "a(u,v)=-a(v,u)",
          "prose": "The edge label is antisymmetric on oriented edges."
        }
      ],
      "conclusions": [
        {
          "cid": "C1",
          "latex": "\\exists \\phi:V\\to\\mathbb{R}\\text{ such that }a(u,v)=\\phi(v)-\\phi(u)\\text{ on each oriented edge}",
          "prose": "Every antisymmetric edge label on a forest is exact."
        }
      ],
      "dependencies": [
        {
          "kind": "lemma",
          "ref": "tree_path_uniqueness",
          "note": "Forests have unique simple paths inside each connected component."
        }
      ],
      "proof_ingredients": [
        "Choose a root in each tree component and define the potential by summing labels along the unique root-to-vertex path.",
        "Use path uniqueness to show the definition is unambiguous.",
        "Check the edge-difference identity directly on neighboring vertices."
      ],
      "required_notation": [
