    {
      "theorem_id": "NG_OBJECT_CONTRACTIVE",
      "title": "Contractive objecthood separation bound",
      "formal_statement_latex": "Let $P$ be a stochastic matrix on finite $\\Y$. Let $T_P:\\D(\\Y)\\to\\D(\\Y)$ be the operator $\\nu\\mapsto \\nu P$, and let $\\lambda(P)$ be the Dobrushin contraction coefficient in total variation. Assume $\\lambda(P)<1$. If $\\nu,\\nu'\\in\\D(\\Y)$ satisfy the $\\varepsilon$-stability bounds \\[ \\TV(\\nu,\\nu P)\\le \\varepsilon, \\qquad \\TV(\\nu',\\nu'P)\\le \\varepsilon,\\] then \\[ \\TV(\\nu,\\nu') \\le \\frac{2\\varepsilon}{1-\\lambda(P)}.\\] In particular, if $\\varepsilon=0$, the stationary distribution is unique.",
      "hypotheses": [
        {
          "hid": "H1",
          "latex": "P\\text{ stochastic on finite }\\Y,\\quad \\lambda(P)<1",
          "prose": "The macro operator is strictly contractive in total variation."
        },
        {
          "hid": "H2",
          "latex": "\\TV(\\nu,\\nu P)\\le \\varepsilon,\\quad \\TV(\\nu',\\nu'P)\\le \\varepsilon",
          "prose": "Both candidate packaged states are epsilon-stable in the admissible metric."
        }
      ],
      "conclusions": [
        {
          "cid": "C1",
          "latex": "\\TV(\\nu,\\nu') \\le \\frac{2\\varepsilon}{1-\\lambda(P)}",
          "prose": "Two epsilon-stable states cannot be too far apart in total variation."
        },
        {
          "cid": "C2",
          "latex": "\\varepsilon=0 \\Rightarrow \\text{the stationary distribution is unique}",
          "prose": "Exact stability implies uniqueness of the fixed distribution under strict contraction."
        }
      ],
      "dependencies": [
        {
          "kind": "lemma",
          "ref": "dobrushin_contraction_estimate",
          "note": "Total variation contracts by at most lambda(P) under one application of P."
        },
        {
          "kind": "lemma",
          "ref": "triangle_inequality_for_eps_stable_laws",
          "note": "Combine contraction with the epsilon-stability defects of the two candidate laws."
        }
      ],
      "proof_ingredients": [
        "Apply the Dobrushin contraction bound to T_P.",
        "Insert the epsilon-stability defects using the triangle inequality.",
        "Set epsilon to zero to obtain uniqueness of the stationary distribution."
      ],
